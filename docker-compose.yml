services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: kryzen
      POSTGRES_PASSWORD: kryzen_pwd
      POSTGRES_DB: kryzen
    volumes: [pgdata:/var/lib/postgresql/data]
    healthcheck: { test: ["CMD-SHELL","pg_isready -U kryzen"], interval: 10s, timeout: 5s, retries: 5 }
  redis:
    image: redis:7-alpine
    restart: unless-stopped
  api:
    build: { context: ., dockerfile: Dockerfile }
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://kryzen:kryzen_pwd@postgres:5432/kryzen
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_started }
    ports: ["8000:8000"]
  bot:
    build: { context: ., dockerfile: Dockerfile }
    restart: unless-stopped
    command: ["python","-m","app.bot.run"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://kryzen:kryzen_pwd@postgres:5432/kryzen
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres: { condition: service_healthy }
      api:      { condition: service_started }
  worker:
    build: { context: ., dockerfile: Dockerfile }
    restart: unless-stopped
    command: ["python","-m","app.workers.cleanup"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://kryzen:kryzen_pwd@postgres:5432/kryzen
    depends_on: [postgres]
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports: ["80:80","443:443"]
    volumes: [./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro]
    depends_on: [api]
volumes:
  pgdata:
